name: Continuous Integration

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Krok 1: Przywracanie zależności dla całego rozwiązania (Aplikacja + Testy)
      - name: Restore Dependencies
        run: dotnet restore FolderSync.sln

      # Krok 2: Budowanie całego rozwiązania. 
      # Gwarantuje to, że główny projekt (FolderSync.csproj) kompiluje się poprawnie na danym OS.
      - name: Build Solution
        run: dotnet build FolderSync.sln -c Release --no-restore

      # Krok 3: Uruchomienie testów jednostkowych.
      # Używamy flagi --no-build, ponieważ projekt został już zbudowany w poprzednim kroku.
      - name: Run Unit Tests
        run: dotnet test tests/FolderSync.UnitTests/FolderSync.UnitTests.csproj -c Release --no-build
