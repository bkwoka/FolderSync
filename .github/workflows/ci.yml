name: Continuous Integration

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 1: Restore dependencies for the entire solution (App + Unit Tests)
      - name: Restore Dependencies
        run: dotnet restore FolderSync.sln

      # Step 2: Build the complete solution in Release configuration.
      # This ensures the main application and all dependencies are cross-platform compatible.
      - name: Build Solution
        run: dotnet build FolderSync.sln -c Release --no-restore

      # Step 3: Execute unit tests across the target operating system.
      # Utilizes --no-build as the solution was pre-compiled in the previous step to optimize pipeline speed.
      - name: Run Unit Tests
        run: dotnet test tests/FolderSync.UnitTests/FolderSync.UnitTests.csproj -c Release --no-build
